<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}금융 자산 커뮤니티{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: #0d9488;
      --color-primary-hover: #0f766e;
      --color-primary-light: #ccfbf1;
      --color-secondary: #64748b;
      --color-secondary-hover: #475569;
      --color-danger: #dc2626;
      --color-danger-hover: #b91c1c;
      --color-bg: #f8fafc;
      --color-bg-card: #ffffff;
      --color-border: #e2e8f0;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.06);
      --radius: 8px;
      --radius-btn: 6px;
      --transition: 0.2s ease;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      background: var(--color-bg);
      color: var(--color-text);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    .app-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow-sm);
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0.9rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .brand {
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--color-text);
      text-decoration: none;
    }

    .nav {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: flex-end;
    }

    .nav form {
      margin: 0;
    }

    .main {
      flex: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 1.5rem;
      width: 100%;
    }

    .container {
      background: var(--color-bg-card);
      padding: 1.75rem;
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--color-border);
    }

    a {
      color: var(--color-primary);
      text-decoration: none;
      transition: color var(--transition);
    }

    a:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1.1rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.5;
      border-radius: var(--radius-btn);
      border: none;
      cursor: pointer;
      transition: background-color var(--transition), color var(--transition), transform var(--transition), box-shadow var(--transition);
      text-decoration: none;
      background: var(--color-primary);
      color: #fff;
    }

    .btn:hover,
    a.btn:hover {
      background: var(--color-primary-hover);
      color: #fff;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
      text-decoration: none;
    }

    .btn-secondary {
      background: var(--color-secondary);
      color: #fff;
    }

    .btn-secondary:hover,
    a.btn-secondary:hover {
      background: var(--color-secondary-hover);
      color: #fff;
    }

    .btn-danger {
      background: var(--color-danger);
      color: #fff;
    }

    .btn-danger:hover,
    button.btn-danger:hover {
      background: var(--color-danger-hover);
      color: #fff;
    }

    .btn-small {
      padding: 0.35rem 0.75rem;
      font-size: 0.8125rem;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
    }

    .breadcrumb {
      font-size: 0.8125rem;
      color: var(--color-text-muted);
      margin-bottom: 1.25rem;
    }

    .breadcrumb a {
      color: var(--color-text-muted);
    }

    .text-muted {
      color: var(--color-text-muted);
      font-size: 0.875rem;
    }

    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mb-0 { margin-bottom: 0; }

    .messages {
      list-style: none;
      padding: 0;
      margin: 0 0 1.25rem 0;
      display: grid;
      gap: 0.5rem;
    }

    .messages li {
      padding: 0.75rem 1rem;
      background: #ecfdf5;
      color: #047857;
      border-radius: var(--radius-btn);
      border: 1px solid #a7f3d0;
      font-size: 0.875rem;
    }

    .messages li.error {
      background: #fef2f2;
      color: var(--color-danger);
      border-color: #fecaca;
    }

    .card-item {
      padding: 1rem 1.25rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      background: var(--color-bg-card);
      transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    }

    .card-item:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    textarea {
      font-family: inherit;
      font-size: 0.9375rem;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-btn);
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px var(--color-primary-light);
    }

    label {
      font-weight: 500;
      font-size: 0.875rem;
      display: block;
      margin-bottom: 0.375rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-input-full {
      width: 100%;
      padding: 0.625rem 0.75rem;
    }

    .form-textarea {
      width: 100%;
      padding: 0.75rem;
      min-height: 160px;
      resize: vertical;
    }

    .form-actions {
      margin-top: 1.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--color-border);
    }

    .form-errors {
      margin: 0.35rem 0 0;
      color: var(--color-danger);
      font-size: 0.85rem;
    }

    .helptext {
      display: block;
      color: var(--color-text-muted);
      font-size: 0.8125rem;
      margin-top: 0.25rem;
    }

    @media (max-width: 640px) {
      .header-inner {
        align-items: flex-start;
        flex-direction: column;
      }

      .nav {
        justify-content: flex-start;
      }

      .main {
        padding: 1rem;
      }

      .container {
        padding: 1.25rem;
      }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>

<body>
  <div class="app-wrap">
    <header class="header">
      <div class="header-inner">
        <a href="{% url 'community:asset_list' %}" class="brand">금융 자산 커뮤니티</a>
        <nav class="nav">
          {% if user.is_authenticated %}
            <span class="text-muted">{{ user.username }}님</span>
            <a href="{% url 'accounts:profile' %}" class="btn btn-secondary btn-small">프로필</a>
            <a href="{% url 'accounts:password_change' %}" class="btn btn-secondary btn-small">비밀번호 변경</a>
            <form action="{% url 'accounts:logout' %}" method="post">
              {% csrf_token %}
              <button type="submit" class="btn btn-small">로그아웃</button>
            </form>
          {% else %}
            <a href="{% url 'accounts:login' %}" class="btn btn-secondary btn-small">로그인</a>
            <a href="{% url 'accounts:signup' %}" class="btn btn-small">회원가입</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <main class="main">
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>

</html>
