<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}댓글 증강 시스템{% endblock %}</title>

    <style>
        :root {
            --bg: #f6f8fb;
            --surface: #ffffff;
            --surface-soft: #f9fafb;
            --line: #e5e7eb;
            --line-dark: #d1d5db;
            --text: #111827;
            --muted: #6b7280;
            --muted-2: #9ca3af;
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --primary-soft: #eff6ff;
            --success: #16a34a;
            --success-soft: #ecfdf5;
            --warning: #d97706;
            --warning-soft: #fffbeb;
            --danger: #dc2626;
            --danger-soft: #fef2f2;
            --shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 28%),
                var(--bg);
            color: var(--text);
            letter-spacing: -0.02em;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.88);
            border-bottom: 1px solid var(--line);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .topbar-inner {
            max-width: 1180px;
            margin: 0 auto;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
        }

        .brand-text strong {
            display: block;
            font-size: 17px;
            line-height: 1.2;
        }

        .brand-text span {
            display: block;
            margin-top: 2px;
            font-size: 12px;
            color: var(--muted);
        }

        .topbar-meta {
            color: var(--muted);
            font-size: 13px;
        }

        main {
            max-width: 1180px;
            margin: 34px auto;
            padding: 0 24px 72px;
        }

        .hero {
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0;
            font-size: 32px;
            line-height: 1.25;
            font-weight: 900;
        }

        .hero p {
            margin: 10px 0 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.7;
        }

        .card {
            background: var(--surface);
            border: 1px solid rgba(229, 231, 235, 0.9);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 20px;
        }

        .card.compact {
            padding: 20px;
        }

        .search-card {
            max-width: 760px;
            margin: 0 auto 22px;
            padding: 34px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 64px 1fr auto;
            gap: 12px;
            align-items: center;
            margin-top: 26px;
        }

        label {
            font-weight: 800;
            color: var(--text);
        }

        input[type="text"] {
            width: 100%;
            height: 48px;
            padding: 0 15px;
            border: 1px solid var(--line-dark);
            border-radius: 10px;
            background: white;
            font-size: 15px;
            outline: none;
            transition: 0.16s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }

        button,
        .button-link {
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            transition: 0.16s ease;
            white-space: nowrap;
        }

        button:hover,
        .button-link:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            text-decoration: none;
        }

        .subtle {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.7;
        }

        .error {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 10px;
            background: var(--danger-soft);
            color: var(--danger);
            font-weight: 700;
            line-height: 1.6;
            border: 1px solid #fecaca;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 18px;
        }

        .section-header h2,
        .section-header h3 {
            margin: 0;
            font-weight: 900;
            line-height: 1.3;
        }

        .section-header h2 {
            font-size: 24px;
        }

        .section-header h3 {
            font-size: 18px;
        }

        .section-desc {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.6;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary-dark);
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .badge.gray {
            background: #f3f4f6;
            color: #4b5563;
        }

        .badge.green {
            background: var(--success-soft);
            color: var(--success);
        }

        .badge.orange {
            background: var(--warning-soft);
            color: var(--warning);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .info-item {
            background: var(--surface-soft);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            min-width: 0;
        }

        .info-label {
            display: block;
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 7px;
        }

        .info-value {
            display: block;
            font-size: 17px;
            font-weight: 900;
            color: var(--text);
            word-break: break-all;
        }

        .summary-box {
            background: linear-gradient(180deg, #f8fbff, #ffffff);
            border: 1px solid #bfdbfe;
            border-left: 4px solid var(--primary);
            border-radius: 12px;
            padding: 18px 20px;
            line-height: 1.8;
            font-size: 14px;
        }

        .steps {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .step {
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 16px;
            background: linear-gradient(180deg, #ffffff, #fbfdff);
        }

        .step-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .step-number {
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 13px;
            font-weight: 900;
        }

        .step-title {
            margin: 0;
            font-weight: 900;
            font-size: 15px;
        }

        .step-desc {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.55;
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .comment-list {
            margin: 0;
            padding-left: 20px;
            max-height: 560px;
            overflow-y: auto;
        }

        .comment-list li {
            padding: 10px 10px 10px 2px;
            border-bottom: 1px solid #eef2f7;
            line-height: 1.65;
            font-size: 13.5px;
        }

        .comment-list li:last-child {
            border-bottom: none;
        }

        .comment-list::-webkit-scrollbar {
            width: 8px;
        }

        .comment-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 999px;
        }

        .empty {
            color: var(--muted-2);
            padding: 22px;
            border-radius: 12px;
            background: var(--surface-soft);
            text-align: center;
            border: 1px dashed var(--line-dark);
        }

        .metric-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        .metric {
            background: #f8fafc;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
        }

        .metric strong {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .metric span {
            font-weight: 900;
        }

        .action-area {
            text-align: center;
            margin-top: 26px;
        }

        @media (max-width: 980px) {
            .info-grid,
            .steps,
            .data-grid,
            .metric-row {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .topbar-inner {
                padding: 14px 18px;
            }

            .topbar-meta {
                display: none;
            }

            main {
                margin: 24px auto;
                padding: 0 16px 56px;
            }

            .hero h1 {
                font-size: 26px;
            }

            .search-card {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <a class="brand" href="{% url 'crawling:index' %}">
                <span class="brand-mark">C</span>
                <span class="brand-text">
                    <strong>댓글 증강 시스템</strong>
                    <span>Comment Crawling · Preprocessing · LLM Augmentation</span>
                </span>
            </a>

            <div class="topbar-meta">
                Django Selenium Pipeline
            </div>
        </div>
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
