{% extends "community/base.html" %}

{% block title %}투자 성향 분석 | 금융 자산 커뮤니티{% endblock %}

{% block extra_css %}
<style>
  .analysis-box {
    white-space: pre-wrap;
    line-height: 1.75;
    padding: 1.25rem;
    border: 1px solid var(--color-border);
    border-radius: var(--radius);
    background: #f8fafc;
  }

  .analysis-error {
    border-color: #fecaca;
    background: #fef2f2;
    color: var(--color-danger);
  }
</style>
{% endblock %}

{% block content %}
<p class="breadcrumb">
  <a href="{% url 'accounts:profile' %}">프로필</a> &gt; 투자 성향 분석
</p>

<h1 class="page-title">투자 성향 분석</h1>
<p class="text-muted">내 게시글 {{ post_count }}개, 댓글 {{ comment_count }}개를 바탕으로 분석합니다.</p>

<div class="analysis-box{% if not result.ok %} analysis-error{% endif %}">{{ result.message }}</div>

<div class="form-actions btn-group">
  <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">프로필로 돌아가기</a>
  <a href="{% url 'community:asset_list' %}" class="btn">게시판으로 이동</a>
</div>
{% endblock %}
