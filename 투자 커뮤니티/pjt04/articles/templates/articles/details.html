{% extends 'base.html' %}
{% block content %}
<div class="container">
    <div style="font-size: 0.8rem; color: #888;">자산 목록 > {{ asset.name }} > 보기</div>
    <h1>{{ article.title }}</h1>
    <div style="color: #999;">{{ article.author }} · {{ article.created_at|date:"Y-m-d H:i" }}</div>
    <hr>
    <p style="min-height: 200px;">{{ article.content }}</p>
    <hr>
    <div style="display: flex; gap: 10px;">
        <a href="{% url 'articles:asset_board' asset.id %}" style="background: #6c757d; color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none;">목록으로</a>
        <a href="{% url 'articles:update' asset.id article.pk %}" style="background: #00a896; color: white; padding: 8px 15px; border-radius: 4px; text-decoration: none;">수정</a>
        <form action="{% url 'articles:delete' asset.id article.pk %}" method="POST">
            {% csrf_token %}
            <button type="submit" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer;">삭제</button>
        </form>
    </div>
</div>
{% endblock %}
